database_key: apple_store_database
schema_key: apple_store_schema

dbt_versions: ">=1.3.0 <3.0.0"

table_variables:
  apple_store__using_subscriptions:
    - sales_subscription_summary
    - sales_subscription_event_summary

  _fivetran_quickstart_app_crash_daily:
    - app_crash_daily

requires_dbt_seed: true

destination_configurations:
  databricks:
    dispatch:
      - macro_namespace: dbt_utils
        search_order: [ 'spark_utils', 'dbt_utils' ]

public_models: [
  "apple_store__source_type_report",
  "apple_store__subscription_report",
  "apple_store__platform_version_report",
  "apple_store__territory_report",
  "apple_store__device_report",
  "apple_store__app_version_report",
  "apple_store__overview_report"
]

supported_vars:
  apple_store__subscription_events:
    type: list
    value:
      - "subscribe"
      - "renew"
      - "cancel"
    description: "Subscription events to be tracked and aggregated in `apple_store__subscription_report`, `apple_store__device_report`, and `apple_store__overview_report`."
    display_name: "Subscription Events"

